global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Scrape configuration for Flower server metrics
  - job_name: 'flower-server'
    static_configs:
      - targets: ['flower-server:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Scrape configuration for model registry metrics
  - job_name: 'model-registry'
    static_configs:
      - targets: ['model-registry:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Scrape configuration for Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Prometheus self-scraping
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s